function overview(){let rows=days.map(d=>{let swim=d.activities.filter(x=>x.type==='Swim').map(x=>`${x.time}${x.end?'–'+x.end:''}`).join('<br>')||'—';let gym=d.activities.filter(x=>x.type==='S&C').map(x=>`${x.time}${x.end?'–'+x.end:''}`).join('<br>')||'—';return`<tr><td><strong>${d.date}</strong></td><td>${swim}</td><td>${gym}</td></tr>`}).join('');return`<div class=section><h2>Swim and gym overview</h2><p>Quick view of pool and gym times.</p></div><table><thead><tr><th>Day</th><th>Swim times</th><th>Gym availability</th></tr></thead><tbody>${rows}</tbody></table>${mealPlanner()}${snackStation()}`}

d>Meat option 1</td><td>Chicken Jambalaya</td><td>Beef Bolognese/Meatballs</td><td>Beef or Chicken Stir-fry</td><td rowspan=6>Pre-Order required for ballroom dinner</td><td>Chicken curry (tomato based)</td><td>Beef burgers</td><td></td></tr><tr><td>Meat option 2</td><td>Chilli Con Carne</td><td>Tuna Pasta Bake</td><td>Fish paella</td><td>Lemon herb baked fish</td><td>Pulled chicken/pork or Chicken skewers with veg</td><td></td></tr><tr><td>Vegetarian option</td><td>Smokey vegetable jambalaya</td><td>Quorn Mince/Lentil Bolognese</td><td>Vegetable Paella</td><td>Butterbean Saag & Lentil Dhal</td><td>Bean burgers or sweetcorn fritters</td><td></td></tr><tr><td>Carbohydrate</td><td>Rice</td><td>Pasta</td><td>Rice in paella and noodles in stir-fry</td><td>Rice</td><td>Buns, rice, potato wedges</td><td></td></tr><tr><td>Vegetables</td><td>Salad bar</td><td>Salad bar</td><td>Salad bar</td><td>Salad bar & boiled veg</td><td>Salad bar</td><td></td></tr><tr><td>Dessert</td><td>Yoghurts and fruit salad</td><td>Rice pudding</td><td>Oat & raisin cookies</td><td>Fruit crumble</td><td>Frozen yogurt</td><td></td></tr></tbody></table>`}
function snackStation(){return`<div class=section><h2>Snack Station</h2><p>Products available at the snack station during camp.</p></div><table class=snack-table><thead><tr><th>Product</th></tr></thead><tbody>${snackProducts.map(p=>`<tr><td>${p}</td></tr>`).join('')}</tbody></table>`}
function mealBlock(id){let m=meals[id];return`<section class=meal-box><h3>Lunch and dinner options</h3><div class=meal-columns><div class=meal-card><h4>Lunch</h4><p>${m.lunch}</p></div><div class=meal-card><h4>Dinner</h4><p>${m.dinner}</p></div></div></section>`}
function dayView(d){return`<section class=day-head><h2>${d.date}</h2><h1 style="font-size:clamp(28px,4vw,40px);margin-top:8px">${d.theme}</h1><p>${d.summary}</p>${d.notes.length?`<p><b style="color:white">Notes:</b> ${d.notes.join(' ')}</p>`:''}</section>${mealBlock(d.id)}<section class=list>${d.activities.map(row).join('')}</section>`}
function initials(name){return name.split(' ').filter(Boolean).map(p=>p[0]).join('').slice(0,3).toUpperCase()}function staffCard(p){return`<article class=staff-card><div class=staff-photo><img src="${p[3]}" alt="${p[0]}" onerror="this.remove();this.parentElement.textContent='${initials(p[0])}';"></div><div class=staff-info><h3>${p[0]}</h3><p class=staff-role>${p[1]}</p>${p[2]?`<p class=staff-extra>${p[2]}</p>`:''}</div></article>`}function staffTab(){return`<div class=section><h2>Staff Team</h2><p>Leadership, coaching and support contacts for the preparation camp.</p></div>${staffSections.map(s=>`<section class=staff-section><h2>${s.title}</h2><div class=staff-grid>${s.people.map(staffCard).join('')}</div></section>`).join('')}`}
