function render(){document.getElementById('tabs').innerHTML=[`<button class="tab ${active==='overview'?'active':''}" data-tab="overview">Overview</button>`,`<button class="tab ${active==='items'?'active':''}" data-tab="items">Items to Bring</button>`,...days.map(d=>`<button class="tab ${active===d.id?'active':''}" data-tab="${d.id}">${d.tab}</button>`),`<button class="tab ${active==='physio'?'active':''}" data-tab="physio">Physio</button>`,`<button class="tab ${active==='staff'?'active':''}" data-tab="staff">Staff Team</button>`].join('');document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{active=b.dataset.tab;render()});document.getElementById('app').innerHTML=active==='overview'?overview():active==='items'?itemsTab():active==='staff'?staffTab():active==='physio'?physioTab():dayView(days.find(x=>x.id===active))}
function row(x){let c=norm(x.type),ps=x.people||[],wear=x.wearImage?`<div class="wear-block"><img class="wear-img" src="${x.wearImage}" alt="${x.wearAlt||'What to wear'}" onerror="this.style.display='none';this.nextElementSibling.style.display='block';"><div class="wear-fallback"><div class="wear-caption">What to wear image</div>Add ${x.wearImage} to the same folder as this HTML file.</div></div>`:'';return`<article class=row><div class=grid><div class="stripe ${c}"></div><div class=time><b>${x.time}</b>${x.end?`<span>to ${x.end}</span>`:''}</div><div class=main><div class=meta><span class=badge>${labels[c]||x.type}</span><span class=loc>📍 ${x.location}</span></div>${x.address?`<div class=address>${x.address}</div>`:''}<h3 class=title>${x.title}</h3><p class=details>${x.details}</p>${wear}</div><div class=involved><div class=cap>👥 Involved</div><div class=chips>${x.involved.map(p=>`<span class=chip>${p}</span>`).join('')||'<span class=chip>—</span>'}</div>${ps.length?`<div class=cap style="margin-top:12px">Named people</div><div class=chips>${ps.map(p=>`<span class="chip named">${p}</span>`).join('')}</div>`:''}</div></div></article>`}
function overview(){return`<div class="section intro-card"><h2>Welcome</h2><p>Welcome to the info pack for the Team Scotland Swimming Preparation Camp. You'll find some general information in this tab, with other tabs showing daily schedules, physio timeslots and staff team info.</p><div class="intro-list"><a class="intro-pill" href="#training-overview">🏊 Training times</a><a class="intro-pill" href="#meal-planner">🍽 Meal planner</a><a class="intro-pill" href="#snack-station">🍌 Snack station</a><a class="intro-pill" href="#useful-contacts">📞 Useful contacts</a></div></div><div class=section id="training-overview"><h2>Swim and gym overview</h2><p>See available training times below. Athlete transport to and from the pool will be in people carriers driven by Lindsay Lewis, Ollie Summers, Paul Wilson and Neil Shanks.</p></div><div class="training-grid">${days.map(trainingCard).join('')}</div>${mealPlanner()}${snackStation()}${coffeeDiscount()}${contacts()}`}
function trainingCard(d){let swim=d.activities.filter(x=>x.type==='Swim').map(x=>`${x.time}${x.end?'–'+x.end:''}`).join(' | ')||'No swim';let gym=d.activities.filter(x=>x.type==='S&C').map(x=>`${x.time}${x.end?'–'+x.end:''}`).join(' | ')||'No gym';return`<article class="training-card"><h3>${d.date}</h3><div class="train-line"><span class="train-icon">🏊</span><div><span class="train-label">Swim</span>${swim}</div></div><div class="train-line"><span class="train-icon">💪</span><div><span class="train-label">Gym</span>${gym}</div></div></article>`}
function mealPlanner(){const mealDays=[['Wednesday','Day 1',meals.wed],['Thursday','Day 2',meals.thu],['Friday','Day 3',meals.fri],['Saturday','Day 4',meals.sat],['Sunday','Day 5',meals.sun],['Monday','Day 6',meals.mon],['Tuesday','Day 7',meals.tue]];return`<div class=section id="meal-planner"><h2>Meal Planner</h2><p>Open each day to view the main meal options.</p><div class="meal-note"><strong>Breakfast:</strong> Alberta Suite: porridge station, fruit, tea/coffee, yoghurt, bread and toaster. Main restaurant options can be brought back to Alberta Suite, including breads, cereals, fruit, natural/strawberry yoghurt, hot items, cheese/meat platters and drinks.</div><div class="meal-note"><strong>Lunch salad bar:</strong> Lettuce, red onion, peppers, cucumber, cherry tomato, sweetcorn, wraps, pitta bread, seeded/white/wholemeal bloomer, pasta, cheese, chicken breast, ham, tuna, baked beans, sweet chilli, mayo, spicy mayo, house dressing, Caesar dressing, olive oil and balsamic.</div></div><div class="meal-day-grid">${mealDays.map((m,i)=>`<details class="meal-day" ${i<2?'open':''}><summary>${m[1]} — ${m[0]}</summary><div class="meal-day-body"><div class="meal-section"><h4>Lunch</h4><ul><li>${m[2].lunch}</li></ul></div><div class="meal-section"><h4>Dinner</h4><ul><li>${m[2].dinner}</li></ul></div></div></details>`).join('')}</div>`}
